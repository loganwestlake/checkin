<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian's Graduation Check-In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --card-hover: #161616;
            --border-color: #1f1f1f;
            --border-hover: #333333;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --ease-custom: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* View Toggler & Admin Access Layout */
        #control-bar {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 0px;
            display: flex;
            gap: 8px;
            align-items: center;
            animation: barFadeIn 0.8s var(--ease-custom) both;
        }

        button.nav-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 18px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: all 0.2s var(--ease-custom);
        }

        button.nav-btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        button.nav-btn:active {
            transform: translateY(0);
        }

        button.nav-btn.secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid var(--border-color);
        }

        button.nav-btn.secondary:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* Views Layout */
        .view {
            display: none;
            height: 100vh;
            width: 100vw;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .view.active {
            display: flex;
            opacity: 1;
        }

        /* ==================== TV VIEW STYLE ==================== */
        #tv-view {
            flex-direction: row;
        }

        #tv-left {
            width: 65%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
            position: relative;
        }

        #tv-left h1 {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            text-transform: uppercase;
            line-height: 0.95;
            margin-bottom: 24px;
            animation: textReveal 1s var(--ease-custom) both;
        }

        #tv-left p.sub {
            font-size: 1.35rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            animation: textReveal 1.2s var(--ease-custom) both;
        }

        #tv-right {
            width: 35%;
            background-color: #020202;
            display: flex;
            flex-direction: column;
            padding: 50px 40px;
        }

        #tv-right h2 {
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            color: var(--text-muted);
        }

        .roster-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 16px; /* Prevents dot cut-off against the scroll track */
        }

        .roster-item {
            font-size: 1.25rem;
            padding: 16px 8px; /* Safe padding alignment */
            border-bottom: 1px solid #121212;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: rowEntrance 0.5s var(--ease-custom) both;
        }

        .roster-item.checked-in {
            color: var(--text-main);
            font-weight: 500;
        }

        .roster-item .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #1a1a1a;
            margin-right: 8px; /* Keeps glow effects safely inside container boundary */
            transition: all 0.4s var(--ease-custom);
        }

        .roster-item.checked-in .status-dot {
            background-color: #fff;
            box-shadow: 0 0 12px 3px #fff;
        }

        /* Overlay Alert on TV */
        #tv-alert-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        #tv-alert-overlay.show {
            opacity: 1;
        }

        .checkmark-icon {
            font-size: 8rem;
            margin-bottom: 16px;
            transform: scale(0.6);
            opacity: 0;
            transition: all 0.5s var(--ease-custom);
        }

        #tv-alert-overlay.show .checkmark-icon {
            transform: scale(1);
            opacity: 1;
            transition-delay: 0.1s;
        }

        #tv-alert-message {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s var(--ease-custom);
        }

        #tv-alert-overlay.show #tv-alert-message {
            transform: translateY(0);
            opacity: 1;
            transition-delay: 0.2s;
        }

        /* ==================== TABLET VIEW STYLE (LIST VIEW) ==================== */
        #tablet-view {
            flex-direction: column;
            padding: 60px 40px;
            max-width: 680px;
            margin: 0 auto;
        }

        #tablet-view h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            text-align: center;
        }

        #tablet-view p.instruction {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tablet-list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-bottom: 80px;
            height: calc(100vh - 220px);
        }

        .guest-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 22px 28px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s var(--ease-custom);
            animation: rowEntrance 0.6s var(--ease-custom) both;
        }

        .guest-row:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
            transform: translateX(4px);
        }

        .guest-row.here {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            pointer-events: none;
            transform: none;
        }

        .guest-name {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .guest-status {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .guest-row:hover .guest-status {
            opacity: 1;
        }

        .guest-row.here .guest-status {
            opacity: 0.9;
        }

        /* ==================== ADMIN VIEW STYLE ==================== */
        #admin-view {
            flex-direction: column;
            padding: 60px 40px;
            max-width: 780px;
            margin: 0 auto;
        }

        #admin-view h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .admin-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .admin-input {
            flex-grow: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 0px;
            transition: all 0.2s var(--ease-custom);
        }

        .admin-input:focus {
            outline: none;
            border-color: #666;
            background: var(--card-hover);
        }

        .admin-list {
            list-style: none;
            overflow-y: auto;
            height: calc(100vh - 320px);
            padding-right: 10px;
        }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            animation: rowEntrance 0.4s var(--ease-custom) both;
        }

        .admin-item:hover {
            border-color: var(--border-hover);
        }

        .admin-inline-name-input {
            background: transparent;
            border: 1px solid transparent;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 6px 10px;
            width: 50%;
            transition: all 0.2s;
        }

        .admin-inline-name-input:focus {
            background: #000;
            border-color: #444;
            outline: none;
        }

        .admin-row-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-toggle-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 14px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-toggle-btn.here {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .delete-btn {
            background: transparent;
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
            padding: 8px 14px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s var(--ease-custom);
        }

        .delete-btn:hover {
            background: #ff4444;
            color: #fff;
            border-color: #ff4444;
        }

        /* ==================== APPS DIALOG MODALS ==================== */
        .app-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s var(--ease-custom);
        }

        .app-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-radius: 0px; /* Sharp Minimalist Edges */
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s var(--ease-custom);
        }

        .app-modal.active .modal-box {
            transform: scale(1);
            opacity: 1;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
        }

        .modal-error {
            color: #ff4444;
            font-size: 0.9rem;
            margin-top: 12px;
            display: none;
            animation: shake 0.4s var(--ease-custom) both;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
        }

        /* ==================== HARDWARE CORE ANIMATIONS ==================== */
        @keyframes rowEntrance {
            from { transform: translateY(12px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes textReveal {
            from { transform: translateY(24px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes barFadeIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* Stagger Layout Calculations */
        .tablet-list-container > :nth-child(1)  { animation-delay: 0.04s; }
        .tablet-list-container > :nth-child(2)  { animation-delay: 0.08s; }
        .tablet-list-container > :nth-child(3)  { animation-delay: 0.12s; }
        .tablet-list-container > :nth-child(4)  { animation-delay: 0.16s; }
        .tablet-list-container > :nth-child(5)  { animation-delay: 0.20s; }
        .tablet-list-container > :nth-child(6)  { animation-delay: 0.24s; }
        .tablet-list-container > :nth-child(7)  { animation-delay: 0.28s; }
        .tablet-list-container > :nth-child(8)  { animation-delay: 0.32s; }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }
    </style>
</head>
<body>

    <div id="control-bar">
        <button class="nav-btn secondary" onclick="toggleFullscreen()">Fullscreen</button>
        <button class="nav-btn secondary" onclick="switchView('tv')">TV Display</button>
        <button class="nav-btn secondary" onclick="switchView('tablet')">Tablet Mode</button>
        <button class="nav-btn" id="login-toggle-btn" onclick="handleAdminAuthBtn()">Login</button>
    </div>

    <div id="tv-view" class="view active">
        <div id="tv-left">
            <div id="tv-alert-overlay">
                <div class="checkmark-icon">✓</div>
                <div id="tv-alert-message">Welcome Guest!</div>
            </div>
            
            <h1>Brian's<br>Graduation</h1>
            <p class="sub">Please sign in on the tablet</p>
        </div>
        
        <div id="tv-right">
            <h2>Attending</h2>
            <ul class="roster-list" id="tv-roster"></ul>
        </div>
    </div>

    <div id="tablet-view" class="view">
        <h1>Welcome</h1>
        <p class="instruction">Select your name to check-in</p>
        
        <div class="tablet-list-container" id="tablet-roster"></div>
    </div>

    <div id="admin-view" class="view">
        <h1>Roster Dashboard</h1>
        
        <div class="admin-actions">
            <input type="text" id="new-guest-name" class="admin-input" placeholder="Enter new guest full name...">
            <button class="nav-btn" onclick="addNewGuest()">Add Guest</button>
        </div>

        <ul class="admin-list" id="admin-roster-list"></ul>
    </div>

    <div id="login-modal" class="app-modal">
        <div class="modal-box">
            <div class="modal-title">Enter Admin Passcode</div>
            <input type="password" id="admin-passcode-input" class="admin-input" style="text-align: center; font-size: 1.5rem; letter-spacing: 4px;" placeholder="••••">
            <div id="login-error-msg" class="modal-error">Incorrect Pin Code.</div>
            <div class="modal-buttons">
                <button class="nav-btn secondary" onclick="closeModal('login-modal')">Cancel</button>
                <button class="nav-btn" onclick="submitAdminLogin()">Verify</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="app-modal">
        <div class="modal-box">
            <div class="modal-title">Remove Guest?</div>
            <p style="color: var(--text-muted); margin-bottom: 8px; font-size: 1rem; line-height: 1.5;" id="delete-modal-text">Are you sure you want to remove this person?</p>
            <div class="modal-buttons">
                <button class="nav-btn secondary" onclick="closeModal('delete-modal')">Cancel</button>
                <button class="nav-btn" style="background: #ff4444; color: white;" id="confirm-delete-btn">Remove</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Configuration targeting your Realtime Database instance endpoint
        const firebaseConfig = {
            apiKey: "AIzaSyChksK08IR2YLyqIQE_TRp7wdy2A4F52ww",
            authDomain: "brians-grad-che.firebaseapp.com",
            projectId: "brians-grad-che",
            databaseURL: "https://brians-grad-che-default-rtdb.firebaseio.com/",
            storageBucket: "brians-grad-che.firebasestorage.app",
            messagingSenderId: "776434328940",
            appId: "1:776434328940:web:684bef97cc4e6c84db3f49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Core references
        const guestsRef = ref(db, 'attendance/guests');
        const alertRef = ref(db, 'attendance/currentAlert');

        let currentRosterData = {};
        let isAdminLoggedIn = false;
        let deleteTargetKey = null;

        // --- FULLSCREEN INTERACTION ENGINE ---
        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        };

        // --- AUTH EXPOSURE LOGIC ---
        window.handleAdminAuthBtn = function() {
            if (isAdminLoggedIn) {
                isAdminLoggedIn = false;
                document.getElementById('login-toggle-btn').innerText = "Login";
                switchView('tablet');
                return;
            }
            document.getElementById('admin-passcode-input').value = '';
            document.getElementById('login-error-msg').style.display = 'none';
            
            const modal = document.getElementById('login-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            
            document.getElementById('admin-passcode-input').focus();
        };

        window.submitAdminLogin = function() {
            const codeInput = document.getElementById('admin-passcode-input');
            if (codeInput.value === "1014") {
                isAdminLoggedIn = true;
                document.getElementById('login-toggle-btn').innerText = "Logout Admin";
                window.closeModal('login-modal');
                switchView('admin');
            } else {
                const errMsg = document.getElementById('login-error-msg');
                errMsg.style.display = 'block';
                errMsg.style.animation = 'none';
                setTimeout(() => errMsg.style.animation = '', 10);
                
                codeInput.value = '';
                codeInput.focus();
            }
        };

        document.getElementById('admin-passcode-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                window.submitAdminLogin();
            }
        });

        window.closeModal = function(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('active');
            setTimeout(() => {
                if(!modal.classList.contains('active')) modal.style.display = 'none';
            }, 300);
        };

        // --- LISTENERS TO SYNC INTERFACES FROM FIREBASE ---
        onValue(guestsRef, (snapshot) => {
            const data = snapshot.val() || {};
            currentRosterData = data;
            
            renderTVRoster(data);
            renderTabletRoster(data);
            renderAdminRoster(data);
        });

        onValue(alertRef, (snapshot) => {
            const alertData = snapshot.val();
            if (alertData && alertData.active) {
                triggerTvAlert(alertData.name);
            }
        });

        // --- INTERFACE ENGINE RENDERS ---
        function renderTVRoster(guests) {
            const tvContainer = document.getElementById('tv-roster');
            tvContainer.innerHTML = '';
            
            Object.keys(guests).forEach((key, index) => {
                const guest = guests[key];
                const isChecked = guest.status === 'here';
                
                const li = document.createElement('li');
                li.className = `roster-item ${isChecked ? 'checked-in' : ''}`;
                li.style.animationDelay = `${index * 0.03}s`;
                li.innerHTML = `
                    <span>${guest.name}</span>
                    <div class="status-dot"></div>
                `;
                tvContainer.appendChild(li);
            });
        }

        function renderTabletRoster(guests) {
            const tabletContainer = document.getElementById('tablet-roster');
            tabletContainer.innerHTML = '';
            
            Object.keys(guests).forEach((key, index) => {
                const guest = guests[key];
                const isChecked = guest.status === 'here';
                
                const div = document.createElement('div');
                div.className = `guest-row ${isChecked ? 'here' : ''}`;
                div.style.animationDelay = `${index * 0.04}s`;
                div.innerHTML = `
                    <div class="guest-name">${guest.name}</div>
                    <div class="guest-status">${isChecked ? '✓ Signed In' : 'Sign In —>'}</div>
                `;
                
                if (!isChecked) {
                    div.addEventListener('click', () => {
                        checkInGuest(key, guest.name);
                    });
                }
                tabletContainer.appendChild(div);
            });
        }

        function renderAdminRoster(guests) {
            const adminContainer = document.getElementById('admin-roster-list');
            adminContainer.innerHTML = '';

            Object.keys(guests).forEach((key, index) => {
                const guest = guests[key];
                const isHere = guest.status === 'here';
                
                const li = document.createElement('li');
                li.className = 'admin-item';
                li.style.animationDelay = `${index * 0.03}s`;
                
                li.innerHTML = `
                    <input type="text" class="admin-inline-name-input" value="${guest.name}" onchange="updateGuestName('${key}', this.value)">
                    <div class="admin-row-controls">
                        <button class="status-toggle-btn ${isHere ? 'here' : ''}" onclick="toggleGuestStatus('${key}', '${guest.status}', '${guest.name.replace(/'/g, "\\'")}')">
                            ${isHere ? 'Present' : 'Absent'}
                        </button>
                        <button class="delete-btn" onclick="openDeleteModal('${key}', '${guest.name.replace(/'/g, "\\'")}')">Remove</button>
                    </div>
                `;
                adminContainer.appendChild(li);
            });
        }

        // --- DATA OPERATIONS (EDIT / WRITE / TOGGLE) ---
        window.checkInGuest = function(key, name) {
            update(ref(db, `attendance/guests/${key}`), { status: 'here' });
            set(alertRef, { active: true, name: name, timestamp: Date.now() });
        };

        window.updateGuestName = function(key, newName) {
            const trimmed = newName.trim();
            if (!trimmed) return;
            update(ref(db, `attendance/guests/${key}`), { name: trimmed });
        };

        window.toggleGuestStatus = function(key, currentStatus, name) {
            const nextStatus = currentStatus === 'here' ? 'absent' : 'here';
            update(ref(db, `attendance/guests/${key}`), { status: nextStatus });
            
            // If turning into Present, fire the TV overlay alert banner too
            if (nextStatus === 'here') {
                set(alertRef, { active: true, name: name, timestamp: Date.now() });
            }
        };

        window.addNewGuest = function() {
            const input = document.getElementById('new-guest-name');
            const name = input.value.trim();
            if (!name) return;

            const newGuestRef = push(guestsRef);
            set(newGuestRef, {
                name: name,
                status: "absent"
            }).then(() => {
                input.value = '';
                input.focus();
            });
        };

        document.getElementById('new-guest-name').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                window.addNewGuest();
            }
        });

        window.openDeleteModal = function(key, name) {
            deleteTargetKey = key;
            document.getElementById('delete-modal-text').innerText = `Are you sure you want to remove "${name}" from the roster?`;
            
            const modal = document.getElementById('delete-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        };

        document.getElementById('confirm-delete-btn').addEventListener('click', function() {
            if (deleteTargetKey) {
                remove(ref(db, `attendance/guests/${deleteTargetKey}`)).then(() => {
                    window.closeModal('delete-modal');
                    deleteTargetKey = null;
                });
            }
        });

        function triggerTvAlert(name) {
            const overlay = document.getElementById('tv-alert-overlay');
            const msg = document.getElementById('tv-alert-message');
            
            msg.innerText = `${name} is here!`;
            overlay.classList.add('show');
            
            setTimeout(() => {
                overlay.classList.remove('show');
                set(alertRef, { active: false, name: "", timestamp: 0 });
            }, 3500);
        }

        window.switchView = function(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${viewName}-view`).classList.add('active');
        };
    </script>
</body>
</html>
